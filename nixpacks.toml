# Build config for Railway (Nixpacks).
#
# Using nixPkgs instead of aptPkgs for native image libraries (sharp, canvas).
# Nix packages are fetched from cache.nixos.org which is far more reliable
# than the Ubuntu apt mirrors that Railway's build sandbox occasionally
# cannot reach (see build failures on 2026-04-17).
#
# Explicit nodejs_22 + npm-9_x because specifying phases.setup.nixPkgs
# replaces the Nixpacks auto-detected defaults rather than augmenting
# them, so we have to re-add the Node runtime here.
#
# apt → nix mapping for native image deps:
#   libcairo2-dev    → cairo
#   libjpeg-dev      → libjpeg
#   libpango1.0-dev  → pango
#   libgif-dev       → giflib
#   librsvg2-dev     → librsvg
#   libvips-dev      → vips
#   build-essential  → gcc + gnumake (bundled in default nix profile)
[phases.setup]
nixPkgs = [
  "nodejs_22",
  "npm-9_x",
  "cairo",
  "libjpeg",
  "pango",
  "giflib",
  "librsvg",
  "vips",
  "pkg-config",
]

[start]
# --max-old-space-size=1536 caps V8's old-generation heap at 1.5 GB so Node
# GCs aggressively and fails fast with a "JavaScript heap out of memory"
# error we can see in logs, rather than the Linux OOM killer SIGKILLing
# the container silently. Must be on the start command, NOT in
# NODE_OPTIONS — that would also apply to the tsc build step and OOM it.
cmd = "node --max-old-space-size=1536 dist-server/index.js"
